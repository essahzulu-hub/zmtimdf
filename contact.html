<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - zmtimdf</title>
    <meta name="description" content="Premier MMA training Lusaka Zambia. Striking grappling conditioning fight camps champions.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div class="container nav">
            <a href="index.html" class="logo-container">
                <img src="images/logo.png" alt="zmtimdf" class="logo-img">
                <span class="logo-text">zmtimdf</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="programs.html">Programs</a></li>
                <li><a href="fighters.html">Fighters</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <a href="contact.html" class="btn btn-primary">Join Now</a>

        </div>
    </header>

    <section id="contact" class="reveal">
        <div class="container">
            <div class="section-head">
                <h2>Get Started</h2>
                <div class="underline"></div>
            </div>
            <div class="contact-wrap">
                <div class="contact-info">
                    <div>
                        <h4>Location</h4>
                        <p>BARLASTONE PARK PLT 29<br>Lusaka Zambia</p>
                    </div>
                    <div>
                        <h4>Phone</h4>
                        <p>+260 96 8984414</p>
                    </div>
                    <div>
                        <h4>Email</h4>
                        <p>zmtimdf@gmail.com</p>
                    </div>
                    <div>
                        <h4>Follow</h4>
                        <p><a href="https://www.facebook.com/share/1G6bvbbsxT/?mibextid=wwXIfr" target="_blank" rel="noopener" style="color: var(--primary-color);">Facebook</a></p>
                    </div>
                </div>
                <div class="contact-form">
                    <form>
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="email@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="goal">Goal</label>
                            <select id="goal" required>
                                <option value="">Select</option>
                                <option>Fitness</option>
                                <option>Fighting</option>
                                <option>Competition</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea rows="4" placeholder="Experience level goals..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">START TRAINING</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; <span id="year"></span> zmtimdf. All Rights Reserved.</p>
        </div>
    </footer>

<script src="main.js"></script>
</body>
</html>
